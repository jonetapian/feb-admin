<div class="container mt-5">
  <div class="row mb-4">
    <div class="col">
      <h2>Lista de Categorias</h2>
    </div>
    <div class="col text-end">
      <a routerLink="/categories-create" class="btn btn-primary">+ Nova Categoria</a>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col">
      <div class="input-group">
        <input
          type="text"
          class="form-control"
          placeholder="Buscar por ID..."
          [(ngModel)]="searchId"
          (keyup.enter)="searchById()"
        />
        <button class="btn btn-outline-primary" type="button" (click)="searchById()">
          Buscar
        </button>
        <button
          class="btn btn-outline-secondary"
          type="button"
          (click)="clearSearch()"
          *ngIf="searchId"
        >
          Limpar
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>

  <table *ngIf="!loading && filteredCategories.length > 0" class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Produtos</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let category of filteredCategories">
        <td>{{ category.id }}</td>
        <td>{{ category.name }}</td>
        <td>{{ category.description || '-' }}</td>
        <td>{{ category.products?.length || 0 }}</td>
        <td>
          <button
            class="btn btn-sm btn-info me-2"
            (click)="editCategory(category.id)"
          >
            Editar
          </button>
          <button
            class="btn btn-sm btn-danger"
            (click)="deleteCategory(category.id)"
          >
            Deletar
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && filteredCategories.length === 0" class="alert alert-info">
    Nenhuma categoria encontrada. <a routerLink="/categories-create">Criar nova categoria</a>
  </div>
</div>
